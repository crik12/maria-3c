<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>I Love You Maria</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0005;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      font-family: 'Dancing Script', cursive;
    }

    /* Starfield background */
    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .star {
      position: absolute;
      border-radius: 50%;
      background: #fff;
      animation: twinkle var(--d) ease-in-out infinite alternate;
    }
    @keyframes twinkle {
      from { opacity: 0.1; transform: scale(0.8); }
      to   { opacity: 0.9; transform: scale(1.2); }
    }

    /* Canvas container */
    #scene {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    canvas {
      display: block;
      /* responsive */
      max-width: 100vw;
      max-height: 90vh;
    }

    /* Bottom subtitle */
    .subtitle {
      color: #ff88aa;
      font-size: clamp(1rem, 3vw, 1.6rem);
      letter-spacing: 0.15em;
      margin-top: 16px;
      opacity: 0;
      animation: fadeIn 2s 1.5s forwards;
      text-shadow: 0 0 18px #ff4477, 0 0 40px #ff004488;
    }
    @keyframes fadeIn {
      to { opacity: 1; }
    }
  </style>
</head>
<body>

<!-- Starfield -->
<div class="stars" id="stars"></div>

<div id="scene">
  <canvas id="heart"></canvas>
  <div class="subtitle"> me gustas mucho, María 💕</div>
</div>

<script>
  /* ── Stars ── */
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 120; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const sz = Math.random() * 2.5 + 0.5;
    s.style.cssText = `
      width:${sz}px; height:${sz}px;
      left:${Math.random()*100}%;
      top:${Math.random()*100}%;
      --d:${(Math.random()*3+1.5).toFixed(2)}s;
      animation-delay:${(Math.random()*4).toFixed(2)}s;
    `;
    starsEl.appendChild(s);
  }

  /* ── Canvas setup ── */
  const canvas = document.getElementById('heart');
  const ctx    = canvas.getContext('2d');

  // Responsive size
  function resize() {
    const size = Math.min(window.innerWidth * 0.95, window.innerHeight * 0.82, 620);
    canvas.width  = size;
    canvas.height = size;
  }
  resize();
  window.addEventListener('resize', () => { resize(); buildParticles(); });

  /* ── Heart parametric equation ── */
  // Returns {x, y} on the heart outline for t in [0, 2π]
  function heartPoint(t, scale, cx, cy) {
    const x = 16 * Math.pow(Math.sin(t), 3);
    const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
    return {
      x: cx + x * scale,
      y: cy + y * scale
    };
  }

  /* ── Build particle array ── */
  const MESSAGE = 'I Love You Maria ';
  let particles = [];

  function buildParticles() {
    particles = [];
    const W  = canvas.width;
    const H  = canvas.height;
    const cx = W / 2;
    const cy = H / 2 + H * 0.04;
    const sc = W / 38;        // scale for heart
    const N  = 260;           // number of particles (text repetitions)

    for (let i = 0; i < N; i++) {
      const t = (i / N) * Math.PI * 2;
      const p = heartPoint(t, sc, cx, cy);

      // Which character in the phrase
      const charIdx = i % MESSAGE.length;
      const char    = MESSAGE[charIdx];

      // Hue shifts around the heart
      const hue = 340 + (i / N) * 40;

      particles.push({
        // target position (on the heart)
        tx: p.x, ty: p.y,
        // current position starts exploded outward
        x: cx + (Math.random()-0.5)*W,
        y: cy + (Math.random()-0.5)*H,
        char,
        hue,
        // individual phase for pulsing
        phase: (i / N) * Math.PI * 2,
        // font size
        fs: Math.max(8, W / 58),
      });
    }
  }
  buildParticles();

  /* ── Animation ── */
  let start = null;
  const ASSEMBLE_MS = 2200;  // time to fly to position

  function lerp(a, b, t) { return a + (b - a) * t; }
  function easeOut(t)     { return 1 - Math.pow(1 - t, 3); }

  function draw(ts) {
    if (!start) start = ts;
    const elapsed = ts - start;
    const progress = Math.min(elapsed / ASSEMBLE_MS, 1);
    const ease     = easeOut(progress);

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Global heart pulse (after assembly)
    const pulse = progress === 1
      ? 1 + 0.06 * Math.sin(ts / 400)
      : 1;

    const W  = canvas.width;
    const H  = canvas.height;
    const cx = W / 2;
    const cy = H / 2 + H * 0.04;

    for (const p of particles) {
      // Interpolate position
      const x = lerp(p.x, (p.tx - cx) * pulse + cx, ease);
      const y = lerp(p.y, (p.ty - cy) * pulse + cy, ease);

      // Per-particle oscillation wave once assembled
      const wave = progress === 1
        ? Math.sin(ts / 600 + p.phase) * 2.5
        : 0;

      // Color: glow effect
      const brightness = 60 + 30 * Math.sin(ts / 700 + p.phase);
      ctx.save();
      ctx.globalAlpha = 0.15 + 0.85 * ease;
      ctx.font        = `bold ${p.fs}px 'Dancing Script', cursive`;
      ctx.textAlign   = 'center';
      ctx.textBaseline= 'middle';

      // Outer glow
      ctx.shadowColor = `hsl(${p.hue}, 100%, 70%)`;
      ctx.shadowBlur  = 14 * ease;
      ctx.fillStyle   = `hsl(${p.hue}, 100%, ${brightness}%)`;
      ctx.fillText(p.char, x + wave * 0.4, y + wave);
      ctx.restore();
    }

    // Floating sparkles
    if (progress > 0.7) {
      const alpha = (progress - 0.7) / 0.3;
      for (let i = 0; i < 6; i++) {
        const angle = (ts / 1800 + i * Math.PI / 3);
        const r     = (W / 2.5) * (0.85 + 0.12 * Math.sin(ts / 900 + i));
        const sx    = cx + r * 0.72 * Math.cos(angle);
        const sy    = cy + r * 0.55 * Math.sin(angle) - H * 0.04;
        const size  = (3 + 2 * Math.sin(ts / 500 + i)) * (W / 500);
        ctx.save();
        ctx.globalAlpha = alpha * (0.5 + 0.5 * Math.sin(ts / 400 + i * 1.3));
        ctx.fillStyle   = `hsl(${320 + i * 15}, 100%, 80%)`;
        ctx.shadowColor = `hsl(${320 + i * 15}, 100%, 80%)`;
        ctx.shadowBlur  = 10;
        ctx.beginPath();
        ctx.arc(sx, sy, size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    requestAnimationFrame(draw);
  }

  requestAnimationFrame(draw);
</script>
</body>

</html>
